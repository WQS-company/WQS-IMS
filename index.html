<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WQS IMS</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #070b16;
        overflow: hidden;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #splash-screen.hide {
        opacity: 0;
        visibility: hidden;
        transform: scale(1.02);
      }

      /* === Animated mesh background === */
      .splash-mesh {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% 40%, rgba(99,102,241,0.12) 0%, transparent 70%),
          radial-gradient(ellipse 60% 80% at 80% 60%, rgba(139,92,246,0.1) 0%, transparent 70%),
          radial-gradient(ellipse 50% 50% at 50% 20%, rgba(59,130,246,0.08) 0%, transparent 60%);
        animation: meshShift 8s ease-in-out infinite alternate;
      }
      @keyframes meshShift {
        0% { opacity: 0.7; transform: scale(1) rotate(0deg); }
        100% { opacity: 1; transform: scale(1.05) rotate(1deg); }
      }

      /* === Grid lines === */
      .splash-grid {
        position: absolute;
        inset: -50%;
        background-image:
          linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: gridMove 20s linear infinite;
        mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 30%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 30%, transparent 70%);
      }
      @keyframes gridMove {
        0% { transform: translate(0, 0); }
        100% { transform: translate(60px, 60px); }
      }

      /* === Floating orbs === */
      .splash-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        animation: orbFloat 6s ease-in-out infinite alternate;
      }
      .splash-orb-1 {
        width: 400px; height: 400px;
        top: -10%; left: -5%;
        background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
        animation-duration: 7s;
      }
      .splash-orb-2 {
        width: 350px; height: 350px;
        bottom: -10%; right: -5%;
        background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%);
        animation-duration: 9s;
        animation-delay: 1s;
      }
      .splash-orb-3 {
        width: 250px; height: 250px;
        top: 30%; right: 15%;
        background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%);
        animation-duration: 8s;
        animation-delay: 2s;
      }
      @keyframes orbFloat {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, -20px) scale(1.1); }
      }

      /* === Particles === */
      .splash-particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .splash-particle {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        animation: particleFloat linear infinite;
      }
      .splash-particle:nth-child(odd) {
        background: rgba(129,140,248,0.5);
        box-shadow: 0 0 6px rgba(129,140,248,0.3);
      }
      .splash-particle:nth-child(even) {
        background: rgba(167,139,250,0.4);
        box-shadow: 0 0 6px rgba(167,139,250,0.2);
      }
      @keyframes particleFloat {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 0.8; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
      }

      /* === Logo === */
      .splash-logo-wrap {
        position: relative;
        z-index: 2;
        margin-bottom: 36px;
        animation: logoEntry 1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .splash-logo {
        position: relative;
        width: 96px;
        height: 96px;
      }
      .splash-logo-ring {
        position: absolute;
        inset: -6px;
        border-radius: 26px;
        border: 1.5px solid rgba(129,140,248,0.2);
        animation: ringPulse 3s ease-in-out infinite;
      }
      .splash-logo-ring-2 {
        position: absolute;
        inset: -14px;
        border-radius: 30px;
        border: 1px solid rgba(129,140,248,0.08);
        animation: ringPulse 3s ease-in-out infinite 0.5s;
      }
      .splash-logo-bg {
        position: absolute;
        inset: 0;
        border-radius: 22px;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
        box-shadow:
          0 0 40px rgba(99,102,241,0.35),
          0 0 80px rgba(139,92,246,0.15),
          inset 0 1px 0 rgba(255,255,255,0.15);
        animation: logoGlow 2.5s ease-in-out infinite alternate;
      }
      .splash-logo-shine {
        position: absolute;
        inset: 0;
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      }
      .splash-logo-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }
      .splash-logo-icon svg {
        width: 46px;
        height: 46px;
        color: white;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      }
      @keyframes logoEntry {
        0% { opacity: 0; transform: scale(0.6) translateY(20px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes ringPulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.02); }
      }
      @keyframes logoGlow {
        0% { box-shadow: 0 0 30px rgba(99,102,241,0.3), 0 0 60px rgba(139,92,246,0.1), inset 0 1px 0 rgba(255,255,255,0.15); }
        100% { box-shadow: 0 0 50px rgba(99,102,241,0.45), 0 0 100px rgba(139,92,246,0.2), inset 0 1px 0 rgba(255,255,255,0.15); }
      }

      /* === Text === */
      .splash-text-group {
        position: relative;
        z-index: 2;
        text-align: center;
        animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }
      .splash-title {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 6px;
        text-transform: uppercase;
        background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 30%, #a5b4fc 60%, #818cf8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 6px;
      }
      .splash-divider {
        width: 48px;
        height: 2px;
        margin: 0 auto 12px;
        background: linear-gradient(90deg, transparent, #818cf8, transparent);
        border-radius: 2px;
        animation: dividerExpand 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }
      @keyframes dividerExpand {
        0% { width: 0; opacity: 0; }
        100% { width: 48px; opacity: 1; }
      }
      .splash-subtitle {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #64748b;
      }
      @keyframes textEntry {
        0% { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* === Loader === */
      .splash-loader-wrap {
        position: relative;
        z-index: 2;
        margin-top: 48px;
        animation: loaderEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
      }
      .splash-loader {
        width: 180px;
        height: 3px;
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }
      .splash-loader-bar {
        position: absolute;
        top: 0;
        left: -50%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #6366f1, #a78bfa, transparent);
        border-radius: 10px;
        animation: loaderSlide 1.2s ease-in-out infinite;
      }
      .splash-loader-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 14px;
      }
      .splash-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #6366f1;
        animation: dotPulse 1.4s ease-in-out infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.15s; }
      .splash-dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes loaderEntry {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes loaderSlide {
        0% { left: -50%; }
        100% { left: 100%; }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
      }

      /* === Version tag === */
      .splash-version {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #334155;
        animation: versionEntry 0.6s ease 1s both;
      }
      @keyframes versionEntry {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      /* === Corner accents === */
      .splash-corner {
        position: absolute;
        width: 40px;
        height: 40px;
        z-index: 2;
        opacity: 0.15;
      }
      .splash-corner-tl { top: 24px; left: 24px; border-top: 1.5px solid #6366f1; border-left: 1.5px solid #6366f1; }
      .splash-corner-tr { top: 24px; right: 24px; border-top: 1.5px solid #6366f1; border-right: 1.5px solid #6366f1; }
      .splash-corner-bl { bottom: 24px; left: 24px; border-bottom: 1.5px solid #6366f1; border-left: 1.5px solid #6366f1; }
      .splash-corner-br { bottom: 24px; right: 24px; border-bottom: 1.5px solid #6366f1; border-right: 1.5px solid #6366f1; }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <!-- Background layers -->
      <div class="splash-mesh"></div>
      <div class="splash-grid"></div>
      <div class="splash-orb splash-orb-1"></div>
      <div class="splash-orb splash-orb-2"></div>
      <div class="splash-orb splash-orb-3"></div>

      <!-- Corner accents -->
      <div class="splash-corner splash-corner-tl"></div>
      <div class="splash-corner splash-corner-tr"></div>
      <div class="splash-corner splash-corner-bl"></div>
      <div class="splash-corner splash-corner-br"></div>

      <!-- Particles -->
      <div class="splash-particles">
        <div class="splash-particle" style="left:8%;animation-duration:7s;animation-delay:0s;width:2px;height:2px"></div>
        <div class="splash-particle" style="left:18%;animation-duration:9s;animation-delay:0.8s;width:3px;height:3px"></div>
        <div class="splash-particle" style="left:28%;animation-duration:6s;animation-delay:1.2s;width:2px;height:2px"></div>
        <div class="splash-particle" style="left:38%;animation-duration:10s;animation-delay:0.3s;width:2px;height:2px"></div>
        <div class="splash-particle" style="left:48%;animation-duration:8s;animation-delay:2s;width:3px;height:3px"></div>
        <div class="splash-particle" style="left:58%;animation-duration:7.5s;animation-delay:0.6s;width:2px;height:2px"></div>
        <div class="splash-particle" style="left:68%;animation-duration:11s;animation-delay:1.5s;width:2px;height:2px"></div>
        <div class="splash-particle" style="left:78%;animation-duration:6.5s;animation-delay:0.2s;width:3px;height:3px"></div>
        <div class="splash-particle" style="left:88%;animation-duration:9.5s;animation-delay:1.8s;width:2px;height:2px"></div>
        <div class="splash-particle" style="left:95%;animation-duration:8.5s;animation-delay:0.5s;width:2px;height:2px"></div>
        <div class="splash-particle" style="left:12%;animation-duration:12s;animation-delay:2.5s;width:1px;height:1px"></div>
        <div class="splash-particle" style="left:52%;animation-duration:7s;animation-delay:3s;width:1px;height:1px"></div>
      </div>

      <!-- Logo -->
      <div class="splash-logo-wrap">
        <div class="splash-logo">
          <div class="splash-logo-ring"></div>
          <div class="splash-logo-ring-2"></div>
          <div class="splash-logo-bg"></div>
          <div class="splash-logo-shine"></div>
          <div class="splash-logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
              <line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Text -->
      <div class="splash-text-group">
        <div class="splash-title">WQS IMS</div>
        <div class="splash-divider"></div>
        <div class="splash-subtitle">Inventory Management</div>
      </div>

      <!-- Loader -->
      <div class="splash-loader-wrap">
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
        <div class="splash-loader-dots">
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
        </div>
      </div>

      <!-- Version -->
      <div class="splash-version">v1.0.0</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
